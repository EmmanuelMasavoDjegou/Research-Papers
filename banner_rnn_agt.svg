<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b81"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="260" fill="url(#g2)"/>

  <g opacity="0.9">
    <g stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5">
      <line x1="900" y1="60" x2="1000" y2="40"/>
      <line x1="900" y1="60" x2="1000" y2="100"/>
      <line x1="900" y1="60" x2="1000" y2="160"/>
      <line x1="900" y1="130" x2="1000" y2="40"/>
      <line x1="900" y1="130" x2="1000" y2="100"/>
      <line x1="900" y1="130" x2="1000" y2="160"/>
      <line x1="900" y1="200" x2="1000" y2="40"/>
      <line x1="900" y1="200" x2="1000" y2="100"/>
      <line x1="900" y1="200" x2="1000" y2="160"/>
      <line x1="1000" y1="40" x2="1100" y2="90"/>
      <line x1="1000" y1="100" x2="1100" y2="90"/>
      <line x1="1000" y1="160" x2="1100" y2="90"/>
      <line x1="1000" y1="40" x2="1100" y2="170"/>
      <line x1="1000" y1="100" x2="1100" y2="170"/>
      <line x1="1000" y1="160" x2="1100" y2="170"/>
    </g>
    <!-- recurrent loop arrow to signal RNN -->
    <path d="M 940,225 A 30,20 0 1 1 970,225" fill="none" stroke="#ff9f43" stroke-width="3" marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 z" fill="#ff9f43"/>
      </marker>
    </defs>
    <g fill="#e94560">
      <circle cx="900" cy="60" r="7"/>
      <circle cx="900" cy="130" r="7"/>
      <circle cx="900" cy="200" r="7"/>
    </g>
    <g fill="#ff9f43">
      <circle cx="1000" cy="40" r="7"/>
      <circle cx="1000" cy="100" r="7"/>
      <circle cx="1000" cy="160" r="7"/>
    </g>
    <g fill="#4fd3c4">
      <circle cx="1100" cy="90" r="7"/>
      <circle cx="1100" cy="170" r="7"/>
    </g>
  </g>

  <text x="70" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#ffffff" font-weight="bold">RNN-AGT</text>
  <text x="70" y="118" font-family="Arial, sans-serif" font-size="21" fill="#f4b8c1">Recurrent Neural Networks for</text>
  <text x="70" y="146" font-family="Arial, sans-serif" font-size="21" fill="#f4b8c1">Accelerated Gap-Time Modeling</text>
  <rect x="70" y="166" width="120" height="6" fill="url(#accent2)"/>
</svg>
